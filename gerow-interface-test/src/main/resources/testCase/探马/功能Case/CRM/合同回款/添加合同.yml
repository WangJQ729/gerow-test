name: 添加合同
story: 合同回款
invocationCount: 1
dataProvider:
  - customerName: 【Gerow】${__RandomName()}
    mobiles: ${__RandomPhoneNum()}
    searchKey: ${mobiles}
beforeClass:
  name: 添加客户
  step:
    - keyWord: 获取员工旅程
    - keyWord: 获取旅程列表
    - keyWord: web添加个人客户
    - keyWord: web端客户查询
    - keyWord: 获取合同字段
    - keyWord: 获取回款字段
testMethod:
  - name: 添加合同
    invocationCount: 1
    dataProvider:
      - contract_name: 合同_${__RandomString(8,zxcvbnmlkjhgfdsaqwertyuiopQWERTYUIOPASDFGHJKLZXCVBNM1234567890,)}
        contractSignDate: ${__PlusDay(yyyy-MM-dd,${__Random(-100,200)},)}
        contractStartDate: ${contractSignDate}
        contractEndDate: ${contractSignDate}
        amount: ${__Random(1000,9999)}
    step:
      - keyWord: 获取合同编号
      - keyWord: 获取部门Id
      - keyWord: 创建合同
  - name: 添加回款单
    invocationCount: 1
    dataProvider:
      - amount: ${__Random(1000,9999)}
        frbTime: ${__PlusDay(yyyy-MM-dd,${__Random(-100,200)},)}
    step:
      - keyWord: 获取回款单编号
      - keyWord: 获取部门Id
      - keyWord: 创建回款单