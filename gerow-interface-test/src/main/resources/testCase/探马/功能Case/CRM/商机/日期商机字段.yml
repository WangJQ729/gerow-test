name: 日期商机字段
story: 商机
dataProvider:
  - opportunity2_fields: 【G】_${__RandomString(4,zxcvbnmlkjhgfdsaqwertyuiopQWERTYUIOPASDFGHJKLZXCVBNM1234567890,)}
    opportunity2_type_name: 【Gerow】_${__RandomString(5,zxcvbnmlkjhgfdsaqwertyuiopQWERTYUIOPASDFGHJKLZXCVBNM1234567890,)}
beforeClass:
  name: 获取商机原状态
  step:
    - keyWord: 获取员工旅程
    - keyWord: 获取旅程列表
    - keyWord: 获取商机原始状态
    - keyWord: 启用商机
    - keyWord: 商机阶段库获取阶段列表
    - keyWord: 保存商机阶段设置
    - keyWord: 商机阶段库获取阶段列表
    - keyWord: 添加日期商机字段
    - keyWord: 获取商机字段列表
    - keyWord: 添加商机类型
    - keyWord: 商机类型添加成功
    - keyWord: 获取商机配置
testMethod:
  - name: 添加日期商机
    severity: CRITICAL
    dataProvider:
      - opportunity_name: 【Gerow】商机名称_${__RandomString(5,zxcvbnmlkjhgfdsaqwertyuiopQWERTYUIOPASDFGHJKLZXCVBNM1234567890,)}
        opportunity_fields_value: ${__PlusDay(yyyy-MM-dd,14,)}
        expectedDealTime: ${__PlusDay(yyyy-MM-dd 00:00:00,7,)}
        expectedDealAmount: ${__Random(1000,99999999999)}
        customerName: 【Gerow】${__RandomName()}
        mobiles: ${__RandomPhoneNum()}
        searchKey: ${mobiles}
    step:
      - keyWord: web添加个人客户
      - keyWord: web端客户查询
      - keyWord: 客户添加商机
      - keyWord: 获取客户动态
      - keyWord: 客户商机列表
      - keyWord: 获取客户商机列表
  - name: 添加日期商机-非日期
    enable: false
    severity: CRITICAL
    dataProvider:
      - opportunity_name: 【Gerow】商机名称_${__RandomString(5,zxcvbnmlkjhgfdsaqwertyuiopQWERTYUIOPASDFGHJKLZXCVBNM1234567890,)}
        opportunity_fields_value: ${__RandomString(8,zxcvbnmlkjhgfdsaqwertyuiopQWERTYUIOPASDFGHJKLZXCVBNM1234567890,)}
        expectedDealTime: ${__PlusDay(yyyy-MM-dd 00:00:00,7,)}
        expectedDealAmount: ${__Random(1000,99999999999)}
        customerName: 【Gerow】${__RandomName()}
        mobiles: ${__RandomPhoneNum()}
        searchKey: ${mobiles}
    step:
      - keyWord: web添加个人客户
      - keyWord: web端客户查询
      - keyWord: 客户添加商机
      - keyWord: 获取客户动态
      - keyWord: 客户商机列表
      - keyWord: 获取客户商机列表
afterMethod:
  name: 删除用户
  step:
    - keyWord: 彻底删除用户
afterClass:
  name: 还原商机配置
  step:
    - keyWord: 删除商机字段
    - keyWord: 删除商机类型
    - keyWord: 设置商机状态