name: 添加商机
story: 商机
dataProvider:
  - opportunity2_fields: 单行_${__RandomString(5,zxcvbnmlkjhgfdsaqwertyuiopQWERTYUIOPASDFGHJKLZXCVBNM1234567890,)}
    opportunity2_type_name: 商机类型_${__RandomString(5,zxcvbnmlkjhgfdsaqwertyuiopQWERTYUIOPASDFGHJKLZXCVBNM1234567890,)}
    customerName: 【Gerow】${__RandomName()}
    mobiles: ${__RandomPhoneNum()}
    searchKey: ${mobiles}
beforeClass:
  name: 获取商机原状态
  step:
    - keyWord: 获取商机原始状态
    - keyWord: 启用商机
    - keyWord: 获取商机字段列表
    - keyWord: 删除所有商机字段
    - keyWord: 添加单行文本商机字段
    - keyWord: 获取商机字段列表-获取字段ID
    - keyWord: 保存商机阶段设置
    - keyWord: 商机阶段库获取阶段ID
    - keyWord: 商机类型列表
    - keyWord: 删除所有商机类型
    - keyWord: 添加商机类型
    - keyWord: 获取商机类型ID
    - keyWord: 获取员工旅程
    - keyWord: 获取旅程列表
    - keyWord: web添加个人客户
    - keyWord: web端客户查询
    - keyWord: 获取商机配置
      extractor:
        - json:
            stagesId: $.data.stages[0].id
testMethod:
  - name: 添加商机
    severity: CRITICAL
    dataProvider:
      - opportunity_name: 【Gerow】商机名称_${__RandomString(5,zxcvbnmlkjhgfdsaqwertyuiopQWERTYUIOPASDFGHJKLZXCVBNM1234567890,)}
        opportunity_fields_value: ${__RandomString(16,zxcvbnmlkjhgfdsaqwertyuiopQWERTYUIOPASDFGHJKLZXCVBNM1234567890,)}
        expectedDealTime: ${__PlusDay(yyyy-MM-dd 00:00:00,7,)}
        expectedDealAmount: ${__Random(1000,99999999999)}
    step:
      - keyWord: 客户添加商机
      - keyWord: 获取客户动态
        assertion:
          - json:
              $.data[0].content: 创建了商机：${opportunity_name}
      - keyWord: 客户商机列表
afterClass:
  name: 还原商机配置
  step:
    - keyWord: 彻底删除用户
    - keyWord: 获取商机字段列表
    - keyWord: 删除所有商机字段
    - keyWord: 商机类型列表
    - keyWord: 删除所有商机类型
    - keyWord: 设置商机状态