name: 企业手机号查询
story: 客户
beforeClass:
  name: 添加客户
  step:
    - keyWord: 获取所有员工
    - keyWord: 获取员工旅程
    - keyWord: 获取旅程列表
testMethod:
  - name: 企业客户-按${searchKeyModel}查询
    severity: CRITICAL
    dataProvider:
      - corpName: 【Gerow】${__RandomName()}公司
        corpContactMobiles: ${__RandomPhoneNum()}
        mobiles: ${corpContactMobiles}
        customerName: 【Gerow】${__RandomName()}
        contactMobiles: ${__RandomPhoneNum()}
        dataProvider:
          - searchKey: ${corpContactMobiles}
            searchKeyModel: 企业手机号
          - searchKey: ${__SubString(${corpContactMobiles},5,17,)}
            searchKeyModel: 企业手机号中间几位
          - searchKey: ${__SubString(${corpContactMobiles},0,17,)}
            searchKeyModel: 企业手机号前几位
          - searchKey: ${__SubString(${corpContactMobiles},5,19,)}
            searchKeyModel: 企业手机号后几位
          - searchKey: ${contactMobiles}
            searchKeyModel: 企业联系人完整手机号
          - searchKey: ${__SubString(${contactMobiles},5,17,)}
            searchKeyModel: 企业联系人手机号中间几位
          - searchKey: ${__SubString(${contactMobiles},0,17,)}
            searchKeyModel: 企业联系人手机号手机号前几位
          - searchKey: ${__SubString(${contactMobiles},5,19,)}
            searchKeyModel: 企业联系人手机号手机号后几位
    step:
      - keyWord: 添加企业
      - keyWord: 添加企业客户
      - keyWord: web端客户查询
  - name: 企业客户-编辑企业手机号-按${searchKeyModel}查询
    severity: CRITICAL
    dataProvider:
      - corpName: 【Gerow】${__RandomName()}公司
        corpContactMobiles: ${__RandomPhoneNum()}
        mobiles: ${corpContactMobiles}
        searchKey: ${mobiles}
        mobiles2: ${__RandomPhoneNum()}
        customerName: 【Gerow】${__RandomName()}
        contactMobiles: ${__RandomPhoneNum()}
        dataProvider:
          - searchKey2: ${mobiles2}
            searchKeyModel: 企业手机号
          - searchKey2: ${__SubString(${mobiles2},5,17,)}
            searchKeyModel: 企业手机号中间几位
          - searchKey2: ${__SubString(${mobiles2},0,17,)}
            searchKeyModel: 企业手机号前几位
          - searchKey2: ${__SubString(${mobiles2},5,19,)}
            searchKeyModel: 企业手机号后几位
          - searchKey2: ${contactMobiles}
            searchKeyModel: 企业联系人手机号
          - searchKey2: ${__SubString(${contactMobiles},5,17,)}
            searchKeyModel: 企业联系人手机号中间几位
          - searchKey2: ${__SubString(${contactMobiles},0,17,)}
            searchKeyModel: 企业联系人手机号前几位
          - searchKey2: ${__SubString(${contactMobiles},5,19,)}
            searchKeyModel: 企业联系人手机号后几位
    step:
      - keyWord: 添加企业
      - keyWord: 添加企业客户
      - keyWord: web端客户查询
      - keyWord: 修改客户手机号
      - keyWord: web端按新手机号查询
  - name: 企业客户-编辑企业手机号-按${searchKeyModel}查询
    severity: CRITICAL
    dataProvider:
      - corpName: 【Gerow】${__RandomName()}公司
        corpContactMobiles: ${__RandomPhoneNum()}
        mobiles: ${corpContactMobiles}
        searchKey: ${mobiles}
        mobiles2: ${__RandomPhoneNum()}
        customerName: 【Gerow】${__RandomName()}
        contactMobiles: ${__RandomPhoneNum()}
        dataProvider:
          - searchKey2: ${mobiles}
            searchKeyModel: 企业原手机号
          - searchKey2: ${__SubString(${mobiles},5,17,)}
            searchKeyModel: 企业原手机号中间几位
          - searchKey2: ${__SubString(${mobiles},0,17,)}
            searchKeyModel: 企业原手机号前几位
          - searchKey2: ${__SubString(${mobiles},5,19,)}
            searchKeyModel: 企业原手机号后几位
    step:
      - keyWord: 添加企业
      - keyWord: 添加企业客户
      - keyWord: web端客户查询
      - keyWord: 修改客户手机号
      - keyWord: web端按原手机号查询
  - name: 企业客户-编辑联系人手机号-按${searchKeyModel}查询
    severity: CRITICAL
    dataProvider:
      - corpName: 【Gerow】${__RandomName()}公司
        corpContactMobiles: ${__RandomPhoneNum()}
        mobiles: ${corpContactMobiles}
        searchKey: ${mobiles}
        customerName: 【Gerow】${__RandomName()}
        contactMobiles: ${__RandomPhoneNum()}
        mobiles2: ${__RandomPhoneNum()}
        dataProvider:
          - searchKey2: ${corpContactMobiles}
            searchKeyModel: 原完整手机号
          - searchKey2: ${__SubString(${corpContactMobiles},5,17,)}
            searchKeyModel: 原手机号中间几位
          - searchKey2: ${__SubString(${corpContactMobiles},0,17,)}
            searchKeyModel: 原手机号前几位
          - searchKey2: ${__SubString(${corpContactMobiles},5,17,)}
            searchKeyModel: 原手机号后几位
          - searchKey2: ${mobiles2}
            searchKeyModel: 联系人新手机号
          - searchKey2: ${__SubString(${mobiles2},0,17,)}
            searchKeyModel: 联系人新手机号前几位
          - searchKey2: ${__SubString(${mobiles2},0,19,)}
            searchKeyModel: 联系人新手机号后几位
          - searchKey2: ${__SubString(${mobiles2},5,17,)}
            searchKeyModel: 联系人新手机号中间几位
    step:
      - keyWord: 添加企业
      - keyWord: 添加企业客户
      - keyWord: web端客户查询-提取企业联系人Id
      - keyWord: 修改企业联系人手机号
      - keyWord: web端按新手机号查询-断言联系人手机号
  - name: 企业客户-编辑联系人手机号-按${searchKeyModel}查询
    severity: CRITICAL
    dataProvider:
      - corpName: 【Gerow】${__RandomName()}公司
        corpContactMobiles: ${__RandomPhoneNum()}
        mobiles: ${corpContactMobiles}
        searchKey: ${mobiles}
        customerName: 【Gerow】${__RandomName()}
        contactMobiles: ${__RandomPhoneNum()}
        mobiles2: ${__RandomPhoneNum()}
        dataProvider:
          - searchKey2: ${contactMobiles}
            searchKeyModel: 联系人原手机号
          - searchKey2: ${__SubString(${contactMobiles},5,17,)}
            searchKeyModel: 联系人原手机号前几位
          - searchKey2: ${__SubString(${contactMobiles},0,17,)}
            searchKeyModel: 联系人原手机号后几位
          - searchKey2: ${__SubString(${contactMobiles},5,19,)}
            searchKeyModel: 联系人原手机号中间几位
    step:
      - keyWord: 添加企业
      - keyWord: 添加企业客户
      - keyWord: web端客户查询-提取企业联系人Id
      - keyWord: 修改企业联系人手机号
      - keyWord: web端按原手机号查询