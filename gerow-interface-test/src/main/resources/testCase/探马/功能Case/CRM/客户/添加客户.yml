name: 添加客户
beforeClass:
  name: 添加客户
  step:
    - keyWord: 获取所有管理员
    - keyWord: 获取员工旅程
    - keyWord: 获取旅程列表
testMethod:
  - name: 添加个人客户-${searchKeyModel}
    severity: CRITICAL
    dataProvider:
      - customerName: 【Gerow】${__RandomName()}
        mobiles: ${__RandomPhoneNum()}
        dataProvider:
          - searchKey: ${mobiles}
            searchKeyModel: 完整手机号
          - searchKey: ${__SubString(${mobiles},0,15,)}
            searchKeyModel: 手机号前几位
          - searchKey: ${__SubString(${mobiles},5,17,)}
            searchKeyModel: 手机号后几位
          - searchKey: ${__SubString(${mobiles},5,15,)}
            searchKeyModel: 手机号中间几位
    step:
      - keyWord: web添加个人客户
      - keyWord: web端客户查询
  - name: 添加企业客户-${searchKeyModel}
    severity: CRITICAL
    dataProvider:
      - corpName: 【Gerow】${__RandomName()}公司
        corpContactMobiles: ${__RandomPhoneNum()}
        mobiles: ${corpContactMobiles}
        customerName: 【Gerow】${__RandomName()}
        contactMobiles: ${__RandomPhoneNum()}
        dataProvider:
          - searchKey: ${corpContactMobiles}
            searchKeyModel: 公司完整手机号
          - searchKey: ${__SubString(${corpContactMobiles},5,15,)}
            searchKeyModel: 公司手机号中间几位
          - searchKey: ${__SubString(${corpContactMobiles},0,15,)}
            searchKeyModel: 公司手机号前几位
          - searchKey: ${__SubString(${corpContactMobiles},5,15,)}
            searchKeyModel: 公司手机号后几位
          - searchKey: ${contactMobiles}
            searchKeyModel: 公司联系人完整手机号
          - searchKey: ${__SubString(${contactMobiles},5,15,)}
            searchKeyModel: 公司联系人手机号中间几位
          - searchKey: ${__SubString(${contactMobiles},0,15,)}
            searchKeyModel: 公司联系人手机号手机号前几位
          - searchKey: ${__SubString(${contactMobiles},5,15,)}
            searchKeyModel: 公司联系人手机号手机号后几位
    step:
      - keyWord: 添加企业
      - keyWord: 添加企业客户
      - keyWord: web端客户查询