name: 待分配企业客户
story: 线索
testMethod:
  - name: 添加待分配企业线索
    dataProvider:
      - corpName: 【Gerow】${__RandomName()}公司
        corpContactMobiles: ${__RandomPhoneNum()}
        phoneNum: ${__RandomPhoneNum()}
    step:
      - keyWord: 添加企业
      - keyWord: 添加企业待分配线索
      - keyWord: 获取待分配线索列表
        assertion:
          - json:
              $.data.result.length(): 1
              $.data.result[0].corpNameFull: ${corpName}
              $.data.result[0].${mobileFieldId}: [ '${phoneNum}' ]
