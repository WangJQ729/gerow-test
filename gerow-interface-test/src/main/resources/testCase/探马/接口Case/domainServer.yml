name: 测试接口
enable: false
story: 测试接口
testMethod:
  - name: 企微回调-${username}
    dataProvider:
#      - username: 郑淑玲
#      - username: 李帅虎
#      - username: 窦泽天
#      - username: Hey Siri
      - username: 王健强
    step:
      - keyWord: 获取所有管理员
        extractor:
          - json:
              salesId: $.data[?(@.username=='${userName}')].salesId
              user_id: $.data[?(@.username=='${userName}')].user_id
              corpid: $.data[?(@.username=='${userName}')].corpid
      - name: 企微同步测试接口
        url: /domainServer/initCustomerTest
        variables:
          corpid: ${corpid}
        responseType: DEFAULT
        headers:
          authorization: ${authorization}
        method: POST
        body: |
          {"${salesId}":${user_id}}