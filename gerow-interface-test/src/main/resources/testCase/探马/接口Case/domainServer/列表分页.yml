name: 列表分页参数
story: 列表分页参数
dataProvider:
  - searchKey: 86
    openSeaName: 【Gerow】公海
beforeClass:
  name: 获取公海Id
  step:
    - keyWord: 公海列表
testMethod:
  - name: 客户列表-${pageSize}
    dataProvider:
      - pageSize: 101
        checkSize: 100
      - pageSize: 100
        checkSize: 100
      - pageSize: 1
        checkSize: 1
      - pageSize: 20
        checkSize: 20
      - pageSize: 50
        checkSize: 50
    step:
      - keyWord: web端客户查询
        bodyEditor:
          json:
            $.pageSize: ${__BeanShell(${pageSize})}
        assertion:
          - json:
              $.code: 0
              $.data.pageSize: ${checkSize}
              $.data.data.length(): ${checkSize}
  - name: 公海列表
    dataProvider:
      - pageSize: 101
        checkSize: 100
      - pageSize: 100
        checkSize: 100
      - pageSize: 1
        checkSize: 1
      - pageSize: 20
        checkSize: 20
      - pageSize: 50
        checkSize: 50
    severity: CRITICAL
    step:
      - keyWord: 根据关键字查询公海客户
        bodyEditor:
          json:
            $.pageSize: ${__BeanShell(${pageSize})}
        assertion:
          - json:
              $.code: 0
              $.data.pageSize: ${checkSize}
              $.data.data.length(): ${checkSize}
