keyWord:
  step:
    - name: 添加企业客户
      url: /domainServer/company/webCustomer/addWebCustomer
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {
            "addressList":[],
            "salesStage":${stageFlowId},
            "stageFlowId":"${stageFlowId}",
            "contactInfo":[
                {
                    "addressList":[],
                    "contactFields":[
                      { "fieldId":${customerNameFieldId},
                        "fieldType":1,
                        "fieldValue":"${customerName}"},
                      { "fieldId":${mobileFieldId},
                        "fieldType":1,
                        "fieldValue":"${contactMobiles}"}
                    ]}],
            "corpFields":[
                {
                    "fieldId":${mobileFieldId},
                    "fieldValue":"${corpContactMobiles}",
                    "phoneArr":[
                        "${corpContactMobiles}"
                    ],
                    "fieldType":8,
                    "isduilcutePhone":false
                }],
            "companyId":${companyId},
            "salesId":${user_id}
        }
      assertion: [ json: { $.code: 0 } ]
    - name: 公海添加企业客户
      url: /domainServer/company/webCustomer/addOpenSeaCustomer
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {
            "addressList":[
            ],
            "contactInfo":[
            ],
            "corpFields":[
            ],
            "companyId":${companyId},
            "openSeaId":${openSeaId},
            "mobiles":[${phoneNum}]
        }
      assertion: [ json: { $.code: 0 } ]
