keyWord:
  step:
    - name: 获取商机配置
      url: /domainServer/market-cloud/crm/opportunity/config/get
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {}
      assertion: [ json: { $.code: 0 } ]
      extractor:
        - json:
            stagesId: $.data.stages[0].id
            stagesName: $.data.stages[0].name
            opportunityField1: $.data.fields[0].id
            opportunityField2: $.data.fields[1].id
            opportunityField3: $.data.fields[2].id
            opportunityField3Options: $.data.fields[2].options[0].id
            opportunityField4: $.data.fields[3].id
            opportunityField5: $.data.fields[4].id
            opportunityField6: $.data.fields[5].id
            opportunityField7: $.data.fields[6].id
    - name: 添加商机
      url: /domainServer/market-cloud/crm/customer-opportunity/add
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        { "salesId":${user_id},
          "customerId":${customerId},
          "name":"${productName}${productModel}",
          "stage":${stagesId},
          "expectedDealTime":"${__PlusDay(yyyy-MM-dd,7,)} 00:00:00",
          "expectedDealAmount":5,
          "fields":[
            {
              "fieldId":"${opportunityField1}",
              "value":""
            },
            {
              "fieldId":"${opportunityField2}",
              "value":""
            },
            {
              "fieldId":"${opportunityField3}",
              "value":${opportunityField3Options}
            },
            {
              "fieldId":"${opportunityField4}",
              "value":"[]"
            },
            {
              "fieldId":"${opportunityField5}",
              "value":"${__PlusDay(yyyy-MM-dd,0,)}"
            },
            {
              "fieldId":"${opportunityField6}",
              "value":${__RandomOrderId()}
            },
            {
              "fieldId":"${opportunityField7}",
              "value":""
            }
        ],"commodities":[]}
      assertion: [ json: { $.code: 0 } ]
