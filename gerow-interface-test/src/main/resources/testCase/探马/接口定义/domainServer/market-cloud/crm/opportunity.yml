keyWord:
  step:
    - name: 启用商机
      url: /domainServer/market-cloud/crm/opportunity/enable
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {"enabled":true}
      assertion: [ json: { $.code: 0 } ]
    - name: 停用商机
      keyWord: 启用商机
      bodyEditor:
        json:
          $.enabled: false
    - name: 获取商机状态
      url: /domainServer/market-cloud/crm/opportunity/enable
      headers:
        authorization: ${authorization}
      method: GET
      assertion: [ json: { $.code: 0 } ]
    - keyWord: 获取商机状态
      name: 获取商机原始状态
      extractor:
        - json:
            opportunity_enable: $.data
    - name: 设置商机状态
      keyWord: 启用商机
      bodyEditor:
        json:
          $.enabled: ${opportunity_enable}
    - name: 客户商机列表
      url: /domainServer/market-cloud/crm/customer-opportunity/list
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {"customerId":${customerId},"salesId":${user_id}}
      assertion:
        - json:
            $.code: 0
            $.data[0].name: ${opportunity_name}
            $.data[0].expectedDealAmount: ${expectedDealAmount}
            $.data[0].expectedDealTime: ${expectedDealTime}
            $.data[0].stage.name: 新线索
        - json:
            $.data[0].stage.id: ${newClueId}
          valueType: BIGDECIMAL
      extractor:
        - json:
            customerOpportunityId: $.data[?(@.name=='${opportunity_name}')].id
    - name: 获取客户商机列表
      url: /domainServer/market-cloud/crm/customer-opportunity/get
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {
            "salesId":${user_id},
            "customerId":${customerId},
            "customerOpportunityId":${customerOpportunityId},
            "authId":10437
        }
      assertion:
        - json:
            $.data[?(@.name=='${opportunity_name}')].fields[?(@.fieldId==${opportunity_fields_id})].value: ['${opportunity_fields_value}']