keyWord:
  step:
    - name: 添加单行文本商机字段
      url: /domainServer/market-cloud/crm/opportunity2/fields/add
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {"id":"","name":"${opportunity2_fields}","required":false,"type":1,"options":[],"scale":0,"maxUnicode":0}
      assertion: [ json: { $.code: 0 } ]
    - keyWord: 添加单行文本商机字段
      name: 添加单选商机字段
      bodyEditor:
        json:
          $.type: 2
          $.options:
            - name: ${options_name_1}
            - name: ${options_name_2}
            - name: ${options_name_3}
            - name: ${options_name_4}
    - keyWord: 添加单行文本商机字段
      name: 添加日期商机字段
      bodyEditor:
        json:
          $.type: 3
    - keyWord: 添加单行文本商机字段
      name: 添加数值商机字段
      bodyEditor:
        json:
          $.type: 4
          $.scale: ${scale}
    - keyWord: 添加单行文本商机字段
      name: 添加多行文本字段
      bodyEditor:
        json:
          $.type: 5
          $.maxUnicode: ${maxUnicode}
    - keyWord: 添加单行文本商机字段
      name: 添加多选商机字段
      bodyEditor:
        json:
          $.type: 6
          $.options:
            - name: ${options_name_1}
            - name: ${options_name_2}
            - name: ${options_name_3}
            - name: ${options_name_4}
    - keyWord: 添加单行文本商机字段
      name: 添加时间商机字段
      bodyEditor:
        json:
          $.type: 7
    - name: 获取商机字段列表
      url: /domainServer/market-cloud/crm/opportunity2/fields/list
      headers:
        authorization: ${authorization}
      method: POST
      body: | 
        {}
      assertion: [json: {$.code: 0}]
      extractor:
        - json:
            opportunity_fields_id: $.data[?(@.name=='${opportunity2_fields}')].id
    - name: 获取选项商机字段选项ID
      keyWord: 获取商机字段列表
      extractor:
        - json:
            opportunity_fields_id: $.data[?(@.name=='${opportunity2_fields}')].id
            opportunity_fields_options_id1: $.data[?(@.name=='${opportunity2_fields}')].options[0].id
            opportunity_fields_options_id2: $.data[?(@.name=='${opportunity2_fields}')].options[1].id
            opportunity_fields_options_id3: $.data[?(@.name=='${opportunity2_fields}')].options[2].id
            opportunity_fields_options_id4: $.data[?(@.name=='${opportunity2_fields}')].options[3].id
    - keyWord: 获取商机字段列表
      name: 商机字段列表判断添加成功
      assertion:
        - json:
            $.code: 0
            $.data[?(@.name=='${opportunity2_fields}')].name:
              - ${opportunity2_fields}
    - name: 删除商机字段
      url: /domainServer/market-cloud/crm/opportunity2/fields/delete
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {"id":${opportunity_fields_id}}
      assertion: [ json: { $.code: 0 } ]
    - name: 编辑商机字段
      url: /domainServer/market-cloud/crm/opportunity2/fields/edit
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {
            "id":${opportunity_fields_id},
            "name":"${opportunity2_fields}",
            "required":false,
            "type":5,
            "options":[],
            "scale":0,
            "maxUnicode":${maxUnicode}
        }
      assertion: [ json: { $.code: 0 } ]