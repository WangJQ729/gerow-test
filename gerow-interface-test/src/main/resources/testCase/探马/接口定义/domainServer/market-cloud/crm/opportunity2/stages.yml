keyWord:
  step:
    - name: 商机阶段库获取阶段列表
      url: /domainServer/market-cloud/crm/opportunity2/stages/list
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {}
      assertion: [ json: { $.code: 0 } ]
      extractor:
        - json:
            newClueId: $.data[0].id
            businessNegotiationId: $.data[1].id
            signContractId: $.data[2].id
            confirmDemandsId: $.data[3].id
            secondaryPurchaseId: $.data[4].id
            winOrderId: $.data[?(@.name=='赢单')].id
            loseStageReasonsId: $.data[?(@.name=='输单')].reason[0].id
            invalidStageReasonsId: $.data[?(@.name=='无效')].reason[0].id
    - name: 保存商机阶段设置
      url: /domainServer/market-cloud/crm/opportunity2/stages/save-list
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {   "commonStages":[
                  {"name":"新线索","id":"${newClueId}"},
                  {"name":"商务谈判","id":"${businessNegotiationId}"},
                  {"name":"签订合同","id":"${signContractId}"},
                  {"name":"确认需求","id":"${confirmDemandsId}"},
                  {"name":"二次购买","id":"${secondaryPurchaseId}"}],
            "winStageName":"赢单",
            "loseStageReasons":[{"name":"价格过高","rank":0,"id":"${loseStageReasonsId}"}],
            "invalidStageReasons":[{"name":"不需要","rank":0,"id":"${invalidStageReasonsId}"}]
        }
      assertion: [ json: { $.code: 0 } ]