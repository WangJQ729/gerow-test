keyWord:
  step:
    - name: 根据手机号查询公海客户
      untilWait: 10
      url: /domainServer/market-cloud/es/v3/webHighSeasList
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {
            "repoId":${openSeaId},
            "isCustomer":1,
            "searchKey":"${phoneNum}",
            "authId":10411,
            "openSeaTime":null,
            "createTime":null,
            "conditions":null,
            "pageSize":50,
            "pageNo":1,
            "sortField":"open_sea_time",
            "sortDir":1
        }
      assertion:
        - json:
            $.code: 0
            $.data.data.length(): 1
            $.data.data[0].qwRemark: ${customerName}
            $.data.data[0].${mobileFieldId}: [ "${phoneNum}" ]
    - name: web端客户查询
      url: /domainServer/market-cloud/es/v3/webCustomerListRetrieve
      untilWait: 10
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {
            "isCustomer":1,
            "authId":"10401",
            "qwLastFollowTypes":[1,2,3,4,5,6],
            "followTimeType":0,
            "replayTime":{
                "start":"${__PlusDay(yyyy-MM-dd,-7,)} 00:00:00",
                "end":"${__PlusDay(yyyy-MM-dd,0,)} 23:59:59"
            },
            "searchKey":"${searchKey}",
            "createTime":null,
            "qwCustomerTime":null,
            "getCreateTime":null,
            "qwLastFollowTime":null,
            "departmentIdList":null,
            "salesIdList":null,
            "isResignedDept":false,
            "role":1,
            "pageSize":50,
            "pageNo":1,
            "sortField":"create_time",
            "sortDir":1
        }
      assertion:
        - json:
            $.code: 0
            $.data.data.length(): 1
            $.data.data[0].${mobileFieldId}: [ '${mobiles}' ]
      extractor:
        - json:
            customerId: $.data.data[0].customerId
    - keyWord: web端客户查询
      name: web端按新增手机号查询
      bodyEditor:
        json:
          $.searchKey: ${searchKey2}
      assertion:
        - json:
            $.code: 0
            $.data.data.length(): 1
            $.data.data[0].${mobileFieldId}: [ '${mobiles}','${mobiles2}' ]
    - keyWord: web端客户查询
      name: web端按新手机号查询
      bodyEditor:
        json:
          $.searchKey: ${searchKey2}
      assertion:
        - json:
            $.code: 0
            $.data.data.length(): 1
            $.data.data[0].${mobileFieldId}: ['${mobiles2}']
    - name: web端客户查询-提取企业联系人Id
      keyWord: web端客户查询
      extractor:
        - json:
            customerId: $.data.data[0].customerId
            contactId: $.data.data[0].contactList[0].contactId
    - keyWord: web端按新手机号查询
      name: web端按新手机号查询-断言联系人手机号
      assertion:
        - json:
            $.code: 0
            $.data.data.length(): 1
            $.data.data[0].contactList[0].phoneNumbers: [ '${mobiles2}' ]