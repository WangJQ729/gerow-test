keyWord:
  step:
    - name: 登录
      url: /domainServer/market-cloud/login
      method: POST
      headers:
        device: web
        User-Agent: Apifox/1.0.0 (https://www.apifox.cn)
      body: |
        {
           "userId": "${userId}",
           "password": "${password}"
        }
      assertion: [ json: { $.code: 0 } ]
      extractor:
        - json:
            authorization: $.data.token
            corpid: $.data.corpid
          site: TESTSUITE
    - name: api新增待分配客户
      url: /apiServer/api/v3/add-unassigned
      needTanmaSign: true
      method: POST
      headers:
        appId: ${appId}
        appKey: ${appKey}
        timestamp: ${timestamp}
      body: ${body}
      assertion: [ json: { $.code: 0 } ]
    - name: 管控-跟进拜访
      url: /domainServer/market-cloud/es/webCustomerFollowerInfoListRetrieve
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {"sortDir":1,"sortField":"create_time","searchKey":"","salesIds":[],"departmentIds":[],"createTime":{"start":"2022-06-13 00:00:00","end":"2023-06-13 23:59:59"},"templateId":null,"signStatus":null,"followerType":null,"pageNo":1,"pageSize":30}
      assertion: [ json: { $.code: 0 } ]