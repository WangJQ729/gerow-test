keyWord:
  step:
    - name: 添加跟进模板
      url: /domainServer/marketCloud/customer/addFollowTemplate
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {
            "name":"${template_name}",
            "enable":true,
            "followConfig":"{\"signIn\":{\"label\":\"签到\",\"open\":true,\"required\":false},\"contacts\":{\"label\":\"关联联系人\",\"open\":false,\"required\":false,\"tips\":\"跟进企业客户时才可用【关联联系人】字段\"},\"businessOpportunity\":{\"label\":\"关联商机\",\"open\":false,\"required\":false}}",
            "scope":"{\"users\":[${user_id}],\"depts\":[]}"
        }
      extractor:
        - json:
            templateId: $.data
      assertion: [ json: { $.code: 0 } ]
