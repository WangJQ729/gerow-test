keyWord:
  step:
    - name: 获取客户跟进记录
      url: /domainServer/qw/webCustomer/getFollowStatus
      headers:
        authorization: ${authorization}
      body: |
        {
            "notGroup":false,
            "customerId":${customerId},
            "salesId":${user_id},
            "pageSize":30,
            "isCorp":false,
            "signStatus":"",
            "operateId":null,
            "followType":1
        }
      method: POST
      assertion:
        - json:
            $.code: 0
            $.data[0].content: ${content}
    - name: 获取客户动态
      url: /domainServer/qw/webCustomer/getFollowStatusAllCrm3V2
      headers:
        authorization: ${authorization}
      body: |
        {"notGroup":false,"customerId":${customerId},"salesId":${user_id},"pageSize":30,"isCorp":false,"allowType":[8,2,1,5,4,3,7,6,9]}
      method: POST
      assertion: [ json: { $.code: 0 } ]