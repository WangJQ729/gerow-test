keyWord:
  step:
    - name: 修改客户描述信息
      url: /domainServer/qwCrm/webCustomer/customerInfoUpdate
      headers:
        authorization:
          ${authorization}
      method: POST
      body: |
        {
            "fieldId":${describeFieldId},
            "fieldType":1,
            "fieldName":"描述",
            "customerId":${customerId},
            "fieldValue":"${description}",
            "salesId":${user_id},
            "isWeb":true,
            "followContent":"添加了客户的信息：\n“描述: ${description}”"
        }
      assertion: [ json: { $.code: 0 } ]
    - name: 公海添加含手机号个人客户
      url: /domainServer/qwCrm/webCustomer/addOpenSeaCustomerByMobiles
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {
            "customerName":"${customerName}",
            "fields":[
            ],
            "addressList":[
            ],
            "mobiles":[${phoneNum}],
            "openSeaId":${openSeaId}
        }
      assertion: [ json: { $.code: 0 } ]
    - name: web添加个人客户
      url: /domainServer/qwCrm/webCustomer/addWebCustomerByMobiles
      headers:
        authorization: ${authorization}
      method: POST
      body: |
        {
            "customerName":"${customerName}",
            "salesId":${user_id},
            "fields":[
            ],
            "addressList":[
            ],
            "salesStage":${stageFlowId},
            "stageFlowId":"${stageId}",
            "mobiles":["${mobiles}"]
        }
      assertion: [ json: { $.code: 0 } ]
